name: Agent Evaluation Report

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  eval-report:
    name: Generate agent evaluation evidence
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run agent evaluation report
        run: ./gradlew :budgetflow-demo-fintech:runAgentEvalReport --args="--out=build/eval-reports"

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-eval-report
          path: |
            budgetflow-demo-fintech/build/eval-reports/agent-eval-report.json
            budgetflow-demo-fintech/build/eval-reports/agent-eval-report.md
          retention-days: 30
          if-no-files-found: error

      - name: Post evidence summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const mdPath = 'budgetflow-demo-fintech/build/eval-reports/agent-eval-report.md';
            if (!fs.existsSync(mdPath)) {
              console.log('No eval report found, skipping comment.');
              return;
            }
            const report = fs.readFileSync(mdPath, 'utf8');
            // Surface the first ~120 lines as a compact PR summary
            const lines = report.split('\n');
            const summary = lines.slice(0, 120).join('\n');
            const truncated = lines.length > 120 ? '\n\n_(report truncated — see full artifact for details)_' : '';
            const body = [
              '## :mag: Agent evaluation evidence',
              '',
              'Generated by `runAgentEvalReport` for this PR. Review the **agent-eval-report** artifact for full details.',
              '',
              '```',
              summary,
              '```',
              truncated,
              '',
              '_To compare against a saved baseline locally:_',
              '```bash',
              './gradlew :budgetflow-demo-fintech:runAgentEvalReport --args="--compare-to=mainline"',
              '```',
              '',
              'See [docs/evaluate.md](docs/evaluate.md#reviewer-workflow-for-prs) for the reviewer workflow.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
